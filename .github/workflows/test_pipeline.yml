name: Wind Turbine Pipeline CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip" # (automatically cache pip dependencies to speed up runs)

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Ensure test dependencies are explicitly present in the CI runner
        pip install pytest joblib

    - name: Execute Pipeline Unit Tests
      run: |
        pytest tests/