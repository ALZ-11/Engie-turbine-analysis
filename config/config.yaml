paths:
  # root dir for SCADA files (can be overridden in .env for Kaggle/Colab)
  data_dir: "data"
  raw_x_file: "engie_X.csv"
  raw_y_file: "engie_Y.csv"
  reports_dir: "reports"

schema:
  id_col: "ID"
  target_col: "TARGET"
  time_col: "Date_time"
  turbine_col: "MAC_CODE"

feature_selection:
  # size of randomized subset to compute MI rapidly
  mi_sample_size: 50000
  # features contributing less than 0.005 bits of information will be dropped
  mi_threshold: 0.005
  # threshold where features with monotonic correlation > 90% are grouped and pruned
  spearman_threshold: 0.90

sequence_parameters:
  # historical window of 6 lookback steps (representing 1 hour at 10-minute intervals)
  lookback_steps: 6
  # expected step difference in Date_time values
  step_size: 1.0

model_parameters:
  # minimum physical power consumption under auxiliary standby mode (kW)
  standby_min_kw: -19.48